<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Карта Хайрула</title>
  <meta name="description" content="Интерактивная карта-компаньон: метки по категориям, прогресс, импорт/экспорт JSON, своя карта. Работает офлайн." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0E1116" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Карта Хайрула" />

  <style>
    :root {
      --bg: #0E1116;
      --surface: #161C24;
      --surface-2: #1C242E;
      --surface-3: #232C37;
      --on-surface: #E6EDF3;
      --muted: #9AA6B2;
      --primary: #4DD0C4;
      --on-primary: #06302C;
      --outline: rgba(168, 194, 212, 0.16);
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
      --r-lg: 22px;
      --r-md: 16px;
      --r-sm: 12px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; height: 100%; height: 100dvh;
      background: var(--bg); color: var(--on-surface);
      font-family: var(--font);
      overscroll-behavior: none;
    }
    body {
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ---- Шапка ---- */
    .appbar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px 6px;
    }
    .appbar h1 {
      flex: 1; margin: 0; font-size: 20px; font-weight: 700; letter-spacing: 0.2px;
    }
    .icon-btn {
      width: 42px; height: 42px; border: none; border-radius: 50%;
      background: transparent; color: var(--on-surface);
      font-size: 22px; cursor: pointer; display: grid; place-items: center;
      transition: background 0.15s;
    }
    .icon-btn:hover, .icon-btn:active { background: var(--surface-3); }

    /* ---- Меню ---- */
    .menu-host { position: relative; }
    .menu {
      position: absolute; right: 0; top: 46px; z-index: 40;
      min-width: 248px; padding: 8px;
      background: var(--surface-2); border: 1px solid var(--outline);
      border-radius: var(--r-md); box-shadow: var(--shadow);
      display: none; flex-direction: column;
    }
    .menu.show { display: flex; }
    .menu button {
      text-align: left; border: none; background: transparent; color: var(--on-surface);
      font: inherit; font-size: 15px; padding: 11px 12px; border-radius: 10px; cursor: pointer;
    }
    .menu button:hover { background: var(--surface-3); }
    .menu .sep { height: 1px; background: var(--outline); margin: 6px 4px; }

    /* ---- Поиск ---- */
    .search-wrap { position: relative; padding: 4px 14px 8px; }
    .search-field {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--outline);
      border-radius: 28px; padding: 0 8px 0 14px; height: 48px;
    }
    .search-field svg { width: 20px; height: 20px; flex: none; opacity: 0.7; }
    .search-field input {
      flex: 1; border: none; outline: none; background: transparent;
      color: var(--on-surface); font: inherit; font-size: 16px; height: 100%;
    }
    .search-field input::placeholder { color: var(--muted); }
    .search-results {
      display: none; position: absolute; left: 14px; right: 14px; top: 56px; z-index: 30;
      max-height: 280px; overflow-y: auto;
      background: var(--surface-2); border: 1px solid var(--outline);
      border-radius: var(--r-md); box-shadow: var(--shadow);
    }
    .search-results.show { display: block; }
    .sr-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; }
    .sr-row:hover { background: var(--surface-3); }
    .sr-text { min-width: 0; }
    .sr-name { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sr-sub { font-size: 12.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ---- Карта ---- */
    .map-wrap { position: relative; flex: 1; min-height: 0; margin: 0 10px; border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--outline); }
    #map { display: block; width: 100%; height: 100%; touch-action: none; }
    .progress {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(14, 17, 22, 0.82); backdrop-filter: blur(6px);
      border: 1px solid var(--outline); border-radius: 10px;
      padding: 7px 12px; font-size: 13px; font-weight: 600;
      pointer-events: none;
    }

    /* ---- Чипы ---- */
    .chips {
      display: flex; gap: 8px; overflow-x: auto; padding: 10px 14px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      display: inline-flex; align-items: center; gap: 7px; flex: none;
      background: var(--surface-2); color: var(--muted);
      border: 1px solid var(--outline); border-radius: 999px;
      padding: 8px 14px; font: inherit; font-size: 13.5px; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap;
    }
    .chip.on { background: color-mix(in srgb, var(--primary) 18%, var(--surface-2)); color: var(--on-surface); border-color: color-mix(in srgb, var(--primary) 45%, transparent); }
    .chip .cnt { opacity: 0.75; font-variant-numeric: tabular-nums; }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }

    /* ---- Карточка метки ---- */
    .backdrop {
      position: fixed; inset: 0; z-index: 50; background: rgba(0, 0, 0, 0.5);
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .backdrop.show { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
      background: var(--surface); border-top-left-radius: 28px; border-top-right-radius: 28px;
      box-shadow: var(--shadow); padding: 10px 20px calc(24px + env(safe-area-inset-bottom));
      transform: translateY(110%); transition: transform 0.28s cubic-bezier(.2,.8,.2,1);
      max-width: 720px; margin: 0 auto;
    }
    .sheet.show { transform: translateY(0); }
    .grabber { width: 40px; height: 4px; border-radius: 2px; background: var(--outline); margin: 6px auto 14px; }
    .sheet h2 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
    .sheet-meta { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; }
    .sheet-desc { margin: 14px 0 0; font-size: 15.5px; line-height: 1.5; }
    .sheet-coords { margin: 12px 0 0; font-size: 12.5px; color: var(--muted); }
    .sheet-actions { display: flex; gap: 12px; margin-top: 20px; }
    .btn {
      flex: 1; border: none; border-radius: 14px; padding: 13px 16px;
      font: inherit; font-size: 15px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-filled { background: color-mix(in srgb, var(--primary) 22%, var(--surface-2)); color: var(--on-surface); }
    .btn-filled:hover { background: color-mix(in srgb, var(--primary) 32%, var(--surface-2)); }
    .btn-outline { background: transparent; color: var(--on-surface); border: 1px solid var(--outline); }
    .btn-outline:hover { background: var(--surface-3); }

    /* ---- Тост ---- */
    .toast {
      position: fixed; left: 50%; bottom: calc(86px + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(20px);
      z-index: 70; background: var(--surface-3); color: var(--on-surface);
      border: 1px solid var(--outline); border-radius: 12px; padding: 12px 18px;
      font-size: 14px; box-shadow: var(--shadow); opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s; max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hidden-input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <header class="appbar">
    <h1>Карта Хайрула</h1>
    <div class="menu-host">
      <button id="menuBtn" class="icon-btn" aria-label="Меню">⋮</button>
      <div id="menu" class="menu" role="menu">
        <button data-action="load-image" role="menuitem">Загрузить свою карту</button>
        <button id="mi-remove-image" data-action="remove-image" role="menuitem">Убрать свою карту</button>
        <div class="sep"></div>
        <button data-action="import-json" role="menuitem">Импорт JSON</button>
        <button data-action="export-json" role="menuitem">Экспорт JSON</button>
        <div class="sep"></div>
        <button data-action="enable-all" role="menuitem">Включить все категории</button>
        <button data-action="disable-all" role="menuitem">Выключить все категории</button>
        <button data-action="recenter" role="menuitem">Вернуть карту в центр</button>
        <div class="sep"></div>
        <button data-action="reset" role="menuitem">Сбросить к встроенному набору</button>
      </div>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-field">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" inputmode="search" placeholder="Поиск по названию или региону" autocomplete="off" />
      <button id="searchClear" class="icon-btn" style="display:none" aria-label="Очистить">✕</button>
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <div id="mapWrap" class="map-wrap">
    <canvas id="map"></canvas>
    <div id="progress" class="progress">Найдено: 0 / 0</div>
  </div>

  <div id="chips" class="chips"></div>

  <!-- Карточка метки -->
  <div id="sheetBackdrop" class="backdrop"></div>
  <section id="sheet" class="sheet" aria-label="Сведения о метке">
    <div class="grabber"></div>
    <h2 id="sheetTitle"></h2>
    <div id="sheetMeta" class="sheet-meta"></div>
    <p id="sheetDesc" class="sheet-desc"></p>
    <div id="sheetCoords" class="sheet-coords"></div>
    <div class="sheet-actions">
      <button id="foundBtn" class="btn btn-filled">Отметить найденным</button>
      <button id="centerBtn" class="btn btn-outline">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.4 7-11a7 7 0 1 0-14 0c0 4.6 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
        В центр
      </button>
    </div>
    <button id="sheetClose" class="btn btn-outline" style="margin-top:12px">Закрыть</button>
  </section>

  <div id="toast" class="toast"></div>

  <!-- Скрытые файловые инпуты -->
  <input id="fileImage" class="hidden-input" type="file" accept="image/*" />
  <input id="fileJson" class="hidden-input" type="file" accept="application/json,.json" />

  <script src="app.js"></script>
</body>
</html>
